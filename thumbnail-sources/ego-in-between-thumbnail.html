<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confidence, Humility, and the Ego In Between Thumbnail</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --bg: #0d0c0a;
      --bg-top: #151310;
      --bg-bottom: #090807;
      --accent: #b3aaa0;   /* warm stone */
      --accent2: #9c948a;  /* taupe — the hook */
      --indigo: #8a8278;   /* warm greige */
      --sky: #d8d2c8;      /* light sand */
      --white: #f6f4f0;
      --text: #e6e2db;
      --muted: #837b72;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(190, 180, 168, 0.14) 0%, transparent 58%),
        radial-gradient(ellipse at 82% 82%, rgba(150, 140, 128, 0.10) 0%, transparent 52%),
        radial-gradient(circle at 16% 78%, rgba(216, 210, 200, 0.06) 0%, transparent 34%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 48%, var(--bg-bottom) 100%);
      color: var(--text);
      font-family: 'Inter', Arial, sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 40%, rgba(190, 180, 168, 0.09), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(150, 140, 128, 0.09), transparent 56%);
    }

    body::after {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.26));
      mix-blend-mode: multiply;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
      padding: 56px 44px 30px;
      text-align: center;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 999px;
      background: rgba(240, 236, 228, 0.85);
      box-shadow: 0 0 8px rgba(205, 196, 184, 0.4);
      opacity: var(--opacity);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 600;
      opacity: 0.95;
    }

    .title-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1240px;
      margin: 54px auto 0;
    }

    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 132px;
      line-height: 0.98;
      letter-spacing: -0.025em;
      font-weight: 700;
      background: linear-gradient(135deg, var(--white) 0%, var(--sky) 38%, var(--accent) 68%, var(--indigo) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow:
        0 0 28px rgba(190, 180, 168, 0.12),
        0 0 80px rgba(150, 140, 128, 0.08);
      text-wrap: balance;
      padding-bottom: 0.14em;
    }

    .title em {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
    }

    .divider {
      width: calc(100% - 220px);
      max-width: 860px;
      margin: 30px auto 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(190, 180, 168, 0), rgba(180, 170, 156, 0.8), rgba(190, 180, 168, 0));
      box-shadow: 0 0 18px rgba(190, 180, 168, 0.14);
    }

    .hook {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 38px;
      letter-spacing: 0.005em;
      color: var(--accent2);
      opacity: 0.96;
    }

    .meta {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      color: var(--muted);
    }

    .author {
      font-size: 19px;
      letter-spacing: 0.04em;
    }

    .site {
      position: absolute;
      left: 48px;
      bottom: 28px;
      z-index: 1;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .episode-corner {
      position: absolute;
      right: 48px;
      bottom: 28px;
      z-index: 1;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

    <div class="eyebrow">TIMELESS</div>

    <div class="title-wrap">
      <div class="title">
        Confidence, Humility,<br /><em>&amp; the Ego In Between</em>

    </div>

    <div class="divider"></div>

    <div class="hook">How the quiet operator plays the long game.</div>

    <div class="meta">

    </div>

    <div class="site">jacklesser.me</div>

  </div>
