      <feComposite in="light" in2="displaced" operator="in" result="lit"/>
      <feBlend in="displaced" in2="lit" mode="soft-light"/>
    </filter>
    <filter id="terrainReliefMid" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
