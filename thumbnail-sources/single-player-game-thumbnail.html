    .canvas {

      text-align: center;

    .star {

      box-shadow: 0 0 8px rgba(255, 255, 255, 0.32);
      opacity: var(--opacity);

    .eyebrow {

      color: var(--eyebrow);
      font-size: 14px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.82;
    }

    .eyebrow-mark {
      display: inline-block;
      width: 44px;
      height: 2px;
      margin: 0 10px 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(201, 155, 106, 0), rgba(201, 155, 106, 1), rgba(201, 155, 106, 0));

    .quote-wrap {

      text-shadow:

      text-wrap: balance;
    }

    .meta {

    .author {
