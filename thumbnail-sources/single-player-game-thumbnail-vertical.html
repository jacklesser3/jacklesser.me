<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Player Game Thumbnail Vertical</title>
  <style>
    @font-face {
      font-family: "Cormorant Garamond";
      src: url("../out/_next/static/media/01e4147cff8141ee-s.p.7787e134.woff2") format("woff2");
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Inter";
      src: url("../out/_next/static/media/83afe278b6a6bb3c-s.p.3a6ba036.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg-top: #151111;
      --bg-mid: #0d0b17;
      --bg-bottom: #0a0914;
      --title: #99b9ff;
      --eyebrow: #c99b6a;
      --muted: rgba(216, 208, 198, 0.72);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(74,70,120,0.22), transparent 28%),
        radial-gradient(circle at 12% 16%, rgba(112,62,48,0.16), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(88,73,160,0.13), transparent 25%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 46%, var(--bg-bottom) 100%);
      color: #e9e8ee;
      font-family: "Inter", Arial, sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 38%, rgba(53,71,170,0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(34,27,67,0.85), transparent 48%);
    }

    body::after {
      background: linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.22));
      mix-blend-mode: multiply;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
      padding: 110px 64px 72px;
      text-align: center;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px rgba(255,255,255,0.32);
      opacity: var(--opacity);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      color: var(--eyebrow);
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.84;
    }

    .eyebrow-mark {
      display: inline-block;
      width: 70px;
      height: 3px;
      margin: 0 14px 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(201,155,106,0), rgba(201,155,106,1), rgba(201,155,106,0));
    }

    .quote-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      margin: 180px auto 0;
    }

    .quote {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 166px;
      line-height: 0.9;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: var(--title);
      text-shadow:
        0 0 34px rgba(108,135,233,0.1),
        0 0 92px rgba(108,135,233,0.06);
      text-wrap: balance;
    }

    .meta {
      position: relative;
      z-index: 1;
      margin-top: 190px;
      color: var(--muted);
    }

    .author {
      font-size: 34px;
      letter-spacing: 0.01em;
    }

    .episode {
      margin-top: 12px;
      font-size: 28px;
      opacity: 0.86;
    }

    .site {
      position: absolute;
      left: 72px;
      bottom: 34px;
      z-index: 1;
      font-size: 22px;
      color: rgba(214,207,199,0.64);
    }

    .episode-corner {
      position: absolute;
      right: 72px;
      bottom: 40px;
      z-index: 1;
      font-size: 22px;
      color: rgba(214,207,199,0.64);
    }
  </style>
</head>
<body>

    <div class="eyebrow">TIMELESS <span class="eyebrow-mark"></span> KEY TAKEAWAYS</div>

    <div class="quote-wrap">

    <div class="meta">

</body>
</html>
